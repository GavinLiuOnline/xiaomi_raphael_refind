name: Build

on:
  push:
    branches: [master, main]
    tags: ["*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      release:
        description: Create GitHub Release
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-aa64:
    name: aa64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git zip \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Prepare GNU-EFI for aarch64
        run: ./scripts/prepare-gnuefi-aa64.sh

      - name: Build aa64
        run: ./scripts/build-aa64.sh

      - name: Upload aa64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: refind-aa64
          path: |
            refind/refind_aa64.efi
            gptsync/gptsync_aa64.efi

  release:
    name: Release
    needs: build-aa64
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && inputs.release == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download aa64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: refind-aa64
          path: dist

      - name: Package release zip
        run: |
          zip -j xiaomi_raphael_refind_efi.zip \
            dist/refind/refind_aa64.efi \
            dist/gptsync/gptsync_aa64.efi
          ls -lh xiaomi_raphael_refind_efi.zip
          unzip -l xiaomi_raphael_refind_efi.zip

      - name: Resolve release tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: xiaomi_raphael_refind ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: xiaomi_raphael_refind_efi.zip
