name: Build

on:
  push:
    branches: [master, main]
    tags: ["*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-aa64:
    name: aa64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git zip \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Prepare GNU-EFI for aarch64
        run: ./scripts/prepare-gnuefi-aa64.sh

      - name: Build aa64 (refind + drivers)
        run: ./scripts/build-aa64.sh

      - name: Verify build outputs
        run: |
          test -f refind/refind_aa64.efi
          test -f gptsync/gptsync_aa64.efi
          driver_count="$(find drivers_aa64 -maxdepth 1 -name '*_aa64.efi' | wc -l)"
          echo "drivers_aa64 count: ${driver_count}"
          ls -lh drivers_aa64/
          test "${driver_count}" -ge 6

      - name: Package release zip
        run: |
          zip -j xiaomi_raphael_refind_efi.zip \
            refind/refind_aa64.efi \
            gptsync/gptsync_aa64.efi
          zip -r xiaomi_raphael_refind_efi.zip drivers_aa64/
          ls -lh xiaomi_raphael_refind_efi.zip
          unzip -l xiaomi_raphael_refind_efi.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: refind-aa64
          path: |
            refind/refind_aa64.efi
            gptsync/gptsync_aa64.efi
            drivers_aa64/
            xiaomi_raphael_refind_efi.zip

      - name: Resolve release tag
        if: github.event_name != 'pull_request'
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          echo "release tag: $(grep '^tag=' "$GITHUB_OUTPUT")"

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: xiaomi_raphael_refind ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          overwrite_existing: true
          files: xiaomi_raphael_refind_efi.zip
